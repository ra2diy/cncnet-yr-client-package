ScriptAction.Jump to Line.Description=Move to a new line number in the script. Used for loops. Line number starts at 1.
ScriptAction.Force Player Win.Name=Force Player Win
ScriptAction.Force Player Win.Description=Forces a game win condition for the owner of the TeamType.
ScriptAction.Unload.Name=Unload
ScriptAction.Unload.Description=Unloads all loaded units. The command parameter specifies which units should stay a part of the team, and which should be severed from the team.
ScriptAction.Unload.Option0.PresetText=Keep Transports, Keep Units
ScriptAction.Unload.Option1.PresetText=Keep Transports, Lose Units
ScriptAction.Unload.Option2.PresetText=Lose Transports, Keep Units
ScriptAction.Unload.Option3.PresetText=Lose Transports, Lose Units
ScriptAction.Deploy.Name=Deploy
ScriptAction.Deploy.Description=Cause all deployable units in the team to deploy.
ScriptAction.Follow Friendlies.Name=Follow Friendlies
ScriptAction.Follow Friendlies.Description=Causes the team to follow the nearest friendly unit.
ScriptAction.Do This.Name=Do This
ScriptAction.Do This.Description=Team members are assigned with the new mission.
ScriptAction.Do This.Option0.PresetText=Sleep
ScriptAction.Do This.Option1.PresetText=Attack
ScriptAction.Do This.Option2.PresetText=Move
ScriptAction.Do This.Option3.PresetText=QMove
ScriptAction.Do This.Option4.PresetText=Retreat
ScriptAction.Do This.Option5.PresetText=Guard
ScriptAction.Do This.Option6.PresetText=Sticky
ScriptAction.Do This.Option7.PresetText=Enter
ScriptAction.Do This.Option8.PresetText=Capture
ScriptAction.Do This.Option9.PresetText=Eaten
ScriptAction.Do This.Option10.PresetText=Harvest
ScriptAction.Do This.Option11.PresetText=Area Guard
ScriptAction.Do This.Option12.PresetText=Return
ScriptAction.Do This.Option13.PresetText=Stop
ScriptAction.Do This.Option14.PresetText=Ambush
ScriptAction.Do This.Option15.PresetText=Hunt
ScriptAction.Do This.Option16.PresetText=Unload
ScriptAction.Do This.Option17.PresetText=Sabotage
ScriptAction.Do This.Option18.PresetText=Construction
ScriptAction.Do This.Option19.PresetText=Selling
ScriptAction.Do This.Option20.PresetText=Repair
ScriptAction.Do This.Option21.PresetText=Rescue
ScriptAction.Do This.Option22.PresetText=Missile
ScriptAction.Do This.Option23.PresetText=Harmless
ScriptAction.Do This.Option24.PresetText=Open
ScriptAction.Do This.Option25.PresetText=Patrol
ScriptAction.Do This.Option26.PresetText=Paradrop Approach
ScriptAction.Do This.Option27.PresetText=Paradrop Overfly
ScriptAction.Do This.Option28.PresetText=Wait
ScriptAction.Do This.Option29.PresetText=Attack (Again)
ScriptAction.Do This.Option30.PresetText=Spyplane Approach
ScriptAction.Do This.Option31.PresetText=Spyplane Overfly
ScriptAction.Set Global Variable.Name=Set Global Variable
ScriptAction.Set Global Variable.Description=Set a global variable.
ScriptAction.Idle Anim.Name=Idle Anim
ScriptAction.Idle Anim.Description=Causes team members to enter their idle animation.
ScriptAction.Idle Anim.Option0.PresetText=Idle1
ScriptAction.Idle Anim.Option1.PresetText=Idle2
ScriptAction.Load onto Transport.Name=Load onto Transport
ScriptAction.Load onto Transport.Description=Causes all units to load into transports, if there are any in the TaskForce
ScriptAction.Spy on Structure at Waypoint.Name=Spy on Structure at Waypoint
ScriptAction.Spy on Structure at Waypoint.Description=Instructs the team to enter the structure at the given waypoint and spy on the structure. Use with units having Infiltrate and Agent set.
ScriptAction.Patrol to Waypoint.Name=Patrol to Waypoint
ScriptAction.Patrol to Waypoint.Description=Move to given waypoint while scanning for enemies within their Sight and actively engage those even if the team has to move out of its patrol route.
ScriptAction.Change Script.Name=Change Script
ScriptAction.Change Script.Description=Instructs the team to execute another script.
ScriptAction.Change Team.Name=Change Team
ScriptAction.Change Team.Description=Instructs the TaskForce to join another TeamType.
ScriptAction.Panic.Name=Panic
ScriptAction.Panic.Description=Causes all units in the team to panic.
ScriptAction.Change House.Name=Change House
ScriptAction.Change House.Description=Changes ownership of the TeamType to the specified house.
ScriptAction.Scatter.Name=Scatter
ScriptAction.Scatter.Description=Instructs the team members to scatter.
ScriptAction.Afraid & Run to Shroud.Name=Afraid & Run to Shroud
ScriptAction.Afraid & Run to Shroud.Description=Instructs the team to behave in a scared manner and run to the nearest shrouded cell. The team will not actively engage in combat or acquire targets and will not retaliate (it will scatter instead if attacked).
ScriptAction.Force Player Loss.Name=Force Player Loss
ScriptAction.Force Player Loss.Description=Forces the owner of the TeamType to lose the game.
ScriptAction.Play Speech.Name=Play Speech
ScriptAction.Play Speech.Description=Play the specified voice file.
ScriptAction.Play Sound.Name=Play Sound
ScriptAction.Play Sound.Description=Play the specified sound file.
ScriptAction.Play Movie.Name=Play Movie
ScriptAction.Play Movie.Description=Play the specified movie file.
ScriptAction.Play Theme.Name=Play Theme
ScriptAction.Play Theme.Description=Plays the specified music theme.
ScriptAction.Reduce Tiberium.Name=Reduce Tiberium
ScriptAction.Reduce Tiberium.Description=Reduces the amount of tiberium in the cell that the TeamType is occupying.
ScriptAction.Begin Production.Name=Begin Production
ScriptAction.Begin Production.Description=Forces the owner of the TeamType to begin the auto-production process.
ScriptAction.Fire Sale.Name=Fire Sale
ScriptAction.Fire Sale.Description=Forces fire sale of all remaining structures owned by the house of the TeamType.
ScriptAction.Self-Destruct.Name=Self-Destruct
ScriptAction.Self-Destruct.Description=Instructs the team to destroy itself usually accompanied by explosion.
ScriptAction.Ion Storm Start.Name=Ion Storm Start
ScriptAction.Ion Storm Start.Description=Initiates an ion storm after the time specified.
ScriptAction.Ion Storm End.Name=Ion Storm End
ScriptAction.Ion Storm End.Description=End the active ion storm.
ScriptAction.Center View on Team.Name=Center View on Team
ScriptAction.Center View on Team.Description=Center the screen on the team.
ScriptAction.Center View on Team.Option0.PresetText=Slowest
ScriptAction.Center View on Team.Option1.PresetText=Slow
ScriptAction.Center View on Team.Option2.PresetText=Fast
ScriptAction.Center View on Team.Option3.PresetText=Faster
ScriptAction.Center View on Team.Option4.PresetText=Fastest
ScriptAction.Shroud Map for Time Interval.Name=Shroud Map for Time Interval
ScriptAction.Shroud Map for Time Interval.Description=Shroud the entire map except for the area revealed by the player's own and/or friendly units for the given time after which the explored areas are revealed again.
ScriptAction.Reveal Map for Time Interval.Name=Reveal Map for Time Interval
ScriptAction.Reveal Map for Time Interval.Description=Reveal the entire map for the given time after which the map is shrouded again.
ScriptAction.Delete Team Members.Name=Delete Team Members
ScriptAction.Delete Team Members.Description=Delete team members from the map.
ScriptAction.Clear Global.Name=Clear Global
ScriptAction.Clear Global.Description=Clears the specified global variable.
ScriptAction.Set Local.Name=Set Local
ScriptAction.Set Local.Description=Sets the specified local variable.
ScriptAction.Clear Local.Name=Clear Local
ScriptAction.Clear Local.Description=Clears the specified local variable.
ScriptAction.Unpanic.Name=Unpanic
ScriptAction.Unpanic.Description=Causes all team members to stop panicking.
ScriptAction.Change Facing.Name=Change Facing
ScriptAction.Change Facing.Description=Instructs the team to turn and face the new specified direction.
ScriptAction.Change Facing.Option0.PresetText=North (Top-Right)
ScriptAction.Change Facing.Option1.PresetText=North-East (Right)
ScriptAction.Change Facing.Option2.PresetText=East (Bottom-Right)
ScriptAction.Change Facing.Option3.PresetText=South-East (Bottom)
ScriptAction.Change Facing.Option4.PresetText=South (Bottom-Left)
ScriptAction.Change Facing.Option5.PresetText=South-West (Left)
ScriptAction.Change Facing.Option6.PresetText=West (Top-Left)
ScriptAction.Change Facing.Option7.PresetText=North-West (Top)
ScriptAction.Wait Until Fully Loaded.Name=Wait Until Fully Loaded
ScriptAction.Wait Until Fully Loaded.Description=Instructs the transport to wait until fully loaded with passengers before executing any subsequent script actions. It is used after load onto transport action is given.
ScriptAction.Unload Truck (TRUCKB to TRUCKA).Name=Unload Truck (TRUCKB to TRUCKA)
ScriptAction.Unload Truck (TRUCKB to TRUCKA).Description=Converts the unit TRUCKB to TRUCKA which continues any further script actions. It gives the impression of the truck being unloaded.
ScriptAction.Load Truck (TRUCKA to TRUCKB).Name=Load Truck (TRUCKA to TRUCKB)
ScriptAction.Load Truck (TRUCKA to TRUCKB).Description=Converts the unit TRUCKA to TRUCKB which continues any further script actions. It gives the impression of the truck being loaded.
ScriptAction.Attack Enemy Structure.Name=Attack Enemy Structure
ScriptAction.Attack Enemy Structure.Description=Attack enemy structure specified by the structure number parameter.
ScriptAction.Move to Enemy Structure.Name=Move to Enemy Structure
ScriptAction.Move to Enemy Structure.Description=Move to enemy structure specified by the structure number parameter.
ScriptAction.Scout.Name=Scout
ScriptAction.Scout.Description=Move in a random direction.
ScriptAction.Register Success.Name=Register Success
ScriptAction.Register Success.Description=When the team is formed through AITrigger (not Trigger) then it is flagged for success when this script action is executed by its task force. A script not containing this action is a fail. A script containing this action but the task force being unable to reach and execute this action even once is a fail. This success or failure is used to adjust the current weight defined in its AITrigger.
ScriptAction.Flash.Name=Flash
ScriptAction.Flash.Description=Causes all members of the task force to 'flash'.
ScriptAction.Play Animation.Name=Play Animation
ScriptAction.Play Animation.Description=Play the specified animation attached to a unit of the team.
ScriptAction.Display Talk Bubble.Name=Display Talk Bubble
ScriptAction.Display Talk Bubble.Description=Displays talk bubble above the unit.
ScriptAction.Display Talk Bubble.Option0.PresetText=None
ScriptAction.Display Talk Bubble.Option1.PresetText=Asterisk (*)
ScriptAction.Display Talk Bubble.Option2.PresetText=Question mark (?)
ScriptAction.Display Talk Bubble.Option3.PresetText=Exclamation mark (!)
ScriptAction.Gather at Enemy (Ares Improved).Name=Gather at Enemy (Ares Improved)
ScriptAction.Gather at Enemy (Ares Improved).Description=Gather on a spot near enemy base at a distance in cells given by AISafeDistance + Number (+ve or -ve). Ares makes use of the unused Number parameter. If not using Ares for YR then set the parameter to 0.
ScriptAction.Gather at Base (Ares Improved).Name=Gather at Base (Ares Improved)
ScriptAction.Gather at Base (Ares Improved).Description=No description
ScriptAction.Iron Curtain (Ares Improved).Name=Iron Curtain (Ares Improved)
ScriptAction.Iron Curtain (Ares Improved).Description=Calls (and waits if nearly ready) for the House to deliver Iron Curtain of the specified superweapon group Number to team. Ares makes use of the unused Number parameter. If not using Ares for YR then set the parameter to 0.
ScriptAction.ChronoSphere Team to Building.Name=ChronoSphere Team to Building
ScriptAction.ChronoSphere Team to Building.Description=If the owner of the team has the Chronosphere fully charged then it will be used to move the team to the given structure number before moving on to next action.
ScriptAction.ChronoSphere Team to target Type.Name=ChronoSphere Team to target Type
ScriptAction.ChronoSphere Team to target Type.Description=If the owner of the team has the Chronosphere fully charged then it will be used to transport the task force to the given target type. Exact target is either nearest/first built based on the value used in TargetDistanceCoefficientDefault or its technotype override of TargetDistanceCoefficient.
ScriptAction.ChronoSphere Team to target Type.Option0.PresetText=N/A (Cancel)
ScriptAction.ChronoSphere Team to target Type.Option1.PresetText=Anything
ScriptAction.ChronoSphere Team to target Type.Option2.PresetText=Structures
ScriptAction.ChronoSphere Team to target Type.Option3.PresetText=Harvesters
ScriptAction.ChronoSphere Team to target Type.Option4.PresetText=Infantry
ScriptAction.ChronoSphere Team to target Type.Option5.PresetText=Vehicles
ScriptAction.ChronoSphere Team to target Type.Option6.PresetText=Factories
ScriptAction.ChronoSphere Team to target Type.Option7.PresetText=Base Defenses
ScriptAction.ChronoSphere Team to target Type.Option8.PresetText=Base Threats
ScriptAction.ChronoSphere Team to target Type.Option9.PresetText=Power Plants
ScriptAction.ChronoSphere Team to target Type.Option10.PresetText=Occupiables
ScriptAction.ChronoSphere Team to target Type.Option11.PresetText=Tech Buildings
ScriptAction.Move to Friendly Structure.Name=Move to Friendly Structure
ScriptAction.Move to Friendly Structure.Description=16,0,1,Move to own structure or owned by allies given in the structure number parameter.
ScriptAction.Attack structure at waypoint.Name=Attack structure at waypoint
ScriptAction.Attack structure at waypoint.Description=Attacks the structure at given waypoint. Owner is not considered as of enemy or ally or neutral. An attack by Engineer would mean repairing the building. This action also uses the weapon if present of the unit instead its special abilities like C4. This is useful in cases like destroying an occupiable structure instead of entering it.
ScriptAction.Enter Grinder.Name=Enter Grinder
ScriptAction.Enter Grinder.Description=Team will enter nearest grinder owned by the owner of this team or allies.
ScriptAction.Occupy Tank Bunker.Name=Occupy Tank Bunker
ScriptAction.Occupy Tank Bunker.Description=Any vehicle members of this team which do not have Bunkerable=no set will enter the nearest vacant structure with Bunker=yes set if it is owned by the owner of the team or any of its allies.
ScriptAction.Enter bio reactor.Name=Enter bio reactor
ScriptAction.Enter bio reactor.Description=Any infantry members of this team will enter the nearest structure with InfantryAbsorb=yes set if it is owned by the owner of this team or any of its allies and has space available.
ScriptAction.Occupy Battle Bunker.Name=Occupy Battle Bunker
ScriptAction.Occupy Battle Bunker.Description=Any infantry members of this team with Occupier=yes set will enter the nearest structure (which they own) with CanOccupyFire=yes set.
ScriptAction.Garrison Structure.Name=Garrison Structure
ScriptAction.Garrison Structure.Description=Any infantry members of this team with Occupier=yes set will enter the nearest (neutral) structure with CanOccupyFire=yes set. It is specifically used so as to transfer the unit's weapon to the structure.
ScriptAction.Auxiliary Power [Ares].Name=Auxiliary Power [Ares]
ScriptAction.Auxiliary Power [Ares].Description=Permanently changes the power output of the house owning the team by the specified amount.
ScriptAction.Kill Drivers [Ares].Name=Kill Drivers [Ares]
ScriptAction.Kill Drivers [Ares].Description=Kills all unprotected drivers of the units in this team and assigns them to the country called Special.
ScriptAction.Take Vehicles [Ares].Name=Take Vehicles [Ares]
ScriptAction.Take Vehicles [Ares].Description=If possible, all infantry (CanDrive or VehicleThief) in this team will be assigned to the closest vehicle they can drive or hijack.
ScriptAction.Convert Type [Ares].Name=Convert Type [Ares]
ScriptAction.Convert Type [Ares].Description=Changes all members of this team into their respective script conversion types defined by their respective Ares Convert.Script flag.
ScriptAction.Sonar Reveal [Ares].Name=Sonar Reveal [Ares]
ScriptAction.Sonar Reveal [Ares].Description=Disables the ability of all team members to cloak themselves for the given Duration (number of frames).
ScriptAction.Disable Weapons [Ares].Name=Disable Weapons [Ares]
ScriptAction.Disable Weapons [Ares].Description=Disables the ability of all team members to fire for the given Duration (number of frames). Use 0 to end the effect.


