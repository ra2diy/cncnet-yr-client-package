TriggerActionType.Create Crate.Parameter1.PresentOption1=1 Unit
TriggerActionType.Create Crate.Parameter1.PresentOption2=2 HealBase
TriggerActionType.Create Crate.Parameter1.PresentOption3=3 Cloak
