AITriggersWindow.CloneForEasierDiffs.Description=$$$TextBlockBegin$$$
Cloning this AI trigger for easier difficulties will create duplicate instances@of this AI trigger for Medium and Easy difficulties, setting the difficulty
setting for each AI trigger to Medium and Easy, respectively.
This will set the current AI trigger's difficulty to Hard only.
In case the AI trigger references a Primary or Secondary TeamTypes,
those TeamTypes and their TaskForces will be duplicated for easier
difficulties. If those duplicates already exist, this action will set
the AI triggers to use those TeamTypes instead.

The script assumes that this AI Trigger has the words 'H' or 'Hard'
in their name and in their respective TeamTypes and TaskForces.
No un-do is available. Do you want to continue?
$$$TextBlockEnd$$$

