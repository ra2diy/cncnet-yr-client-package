TriggerActionType.Iron Curtain at.Name=Iron Curtain at
TriggerActionType.Iron Curtain at.Description=Fires the Iron Curtain at the specified waypoint.
TriggerActionType.Pause Game.Name=Pause Game
TriggerActionType.Pause Game.Description=Pauses the game for the specified number of seconds.
TriggerActionType.Evict Occupiers.Name=Evict Occupiers
TriggerActionType.Evict Occupiers.Description=Evicts occupants from the attached building.
TriggerActionType.Center (Jump) Camera at Waypoint.Name=Center (Jump) Camera at Waypoint
TriggerActionType.Center (Jump) Camera at Waypoint.Description=Moves the tactical view to the specified waypoint.
TriggerActionType.Make House Cheer.Name=Make House Cheer
TriggerActionType.Make House Cheer.Description=All infantry of the specified house will play their cheer animation if they can.
TriggerActionType.Set Sidebar Tab.Name=Set Sidebar Tab
TriggerActionType.Set Sidebar Tab.Description=Flips sidebar to specified tab number (0-3).
TriggerActionType.Flash Cameo.Name=Flash Cameo
TriggerActionType.Flash Cameo.Description=Flashes the cameo of the given object for the specified number of frames.
TriggerActionType.Stop Sounds at.Name=Stop Sounds at
TriggerActionType.Stop Sounds at.Description=Stops all sounds playing at given waypoint that were started using the Play Sound At trigger action.
TriggerActionType.Play Ingame Movie (Pause Game).Name=Play Ingame Movie (Pause Game)
TriggerActionType.Play Ingame Movie (Pause Game).Description=Pauses game, locks player input and displays the specified movie in the sidebar.
TriggerActionType.Clear All Smudges.Name=Clear All Smudges
TriggerActionType.Clear All Smudges.Description=Will delete all Smudge objects from the map.
TriggerActionType.Destroy All of.Name=Destroy All of
TriggerActionType.Destroy All of.Description=Kills everything of the specified house.
TriggerActionType.Destroy All Buildings of.Name=Destroy All Buildings of
TriggerActionType.Destroy All Buildings of.Description=Kills all buildings for specified house.
TriggerActionType.Destroy All Land Units of.Name=Destroy All Land Units of
TriggerActionType.Destroy All Land Units of.Description=Kills all land units for specified house.
TriggerActionType.Destroy All Naval Units of.Name=Destroy All Naval Units of
TriggerActionType.Destroy All Naval Units of.Description=Kills all naval units for specified house.
TriggerActionType.Mind Control Base of.Name=Mind Control Base of
TriggerActionType.Mind Control Base of.Description=The owner of the trigger will mind control the argument's base.
TriggerActionType.Restore Mind Controlled Base to.Name=Restore Mind Controlled Base to
TriggerActionType.Restore Mind Controlled Base to.Description=The owner of the trigger will give all buildings that were the argument's back to it.
TriggerActionType.Create Building At.Name=Create Building At
TriggerActionType.Create Building At.Description=Owner of the trigger will gain this type of building at this waypoint. Overlays will be cleared and units bumped.
TriggerActionType.Restore Starting Technos of.Name=Restore Starting Technos of
TriggerActionType.Restore Starting Technos of.Description=All Buildings and units this house had at the start of the game will be recreated. Will bump units and erase Overlays.
TriggerActionType.Chrono Screen Effect for.Name=Chrono Screen Effect for
TriggerActionType.Chrono Screen Effect for.Description=Will tile the screen with the full screen chrono effect for this many frames.
TriggerActionType.Teleport All to.Name=Teleport All to
TriggerActionType.Teleport All to.Description=All Units of trigger owning House will teleport to Waypoint.
TriggerActionType.Set Superweapon Charge.Name=Set Superweapon Charge
TriggerActionType.Set Superweapon Charge.Description=The owner of this trigger will have this superweapon charged to this percent% if they have the superweapon. Takes an int (0-100).
TriggerActionType.Restore Starting Buildings of.Name=Restore Starting Buildings of
TriggerActionType.Restore Starting Buildings of.Description=All Buildings this house had at the start of the game will be healed or recreated. Will bump units and erase Overlays.
TriggerActionType.Flash Buildings of Type.Name=Flash Buildings of Type
TriggerActionType.Flash Buildings of Type.Description=All buildings of this type owned by trigger owner will flash for this long.
TriggerActionType.Superweapon Set Recharge Time.Name=Superweapon Set Recharge Time
TriggerActionType.Superweapon Set Recharge Time.Description=Changes the time (in frames) this superweapon takes to charge the next time it is reset or fired.
TriggerActionType.Superweapon Reset Recharge Time.Name=Superweapon Reset Recharge Time
TriggerActionType.Superweapon Reset Recharge Time.Description=Changes the time (in frames) this superweapon takes to charge back to normal.
TriggerActionType.Superweapon Reset.Name=Superweapon Reset
TriggerActionType.Superweapon Reset.Description=Resets a superweapon like a spy had gotten in.
TriggerActionType.Preferred Target Cell Set.Name=Preferred Target Cell Set
TriggerActionType.Preferred Target Cell Set.Description=The owner of this trigger will aim all future targetable superweapons at this waypoint.
TriggerActionType.Preferred Target Cell Clear.Name=Preferred Target Cell Clear
TriggerActionType.Preferred Target Cell Clear.Description=The owner of this trigger will go back to targeting its superweapons normally.
TriggerActionType.Center Base Cell Set.Name=Center Base Cell Set
TriggerActionType.Center Base Cell Set.Description=Owner of this trigger will consider the center of its base to be this waypoint.
TriggerActionType.Center Base Cell Clear.Name=Center Base Cell Clear
TriggerActionType.Center Base Cell Clear.Description=Owner of this trigger will go back to computing its center.
TriggerActionType.Blackout Radar Trigger.Name=Blackout Radar Trigger
TriggerActionType.Blackout Radar Trigger.Description=Owner will have radar blackout for this many frames.
TriggerActionType.Defensive Target Cell Set.Name=Defensive Target Cell Set
TriggerActionType.Defensive Target Cell Set.Description=The owner of this trigger will aim all future force shields at this waypoint.
TriggerActionType.Defensive Target Cell Clear.Name=Defensive Target Cell Clear
TriggerActionType.Defensive Target Cell Clear.Description=The owner of this trigger will go back to targeting its force shields normally.
TriggerActionType.Retint Red.Name=Retint Red
TriggerActionType.Retint Red.Description=Retint the Red portion of the screen, %.
TriggerActionType.Retint Green.Name=Retint Green
TriggerActionType.Retint Green.Description=Retint the Green portion of the screen, %.
TriggerActionType.Retint Blue.Name=Retint Blue
TriggerActionType.Retint Blue.Description=Retint the Blue portion of the screen, %.
TriggerActionType.Jump Camera Home.Name=Jump Camera Home
TriggerActionType.Jump Camera Home.Description=Just like hitting the 'H' key.
TriggerActionType.Auxiliary Power [Ares].Name=Auxiliary Power [Ares]
TriggerActionType.Auxiliary Power [Ares].Description=Permanently adds an amount to the specified house’s auxiliary power. Can be negative to create a drain or remove previously given auxiliary power. Applying this effect multiple times is cumulative.
TriggerActionType.Kill Drivers Of [Ares].Name=Kill Drivers Of [Ares]
TriggerActionType.Kill Drivers Of [Ares].Description=Kills all drivers of the units that have the trigger attached that contains this action. This action respects mechanisms that prevent drivers being killed. All affected units will change to the country specified by the house index. Use -1 to change the owner to the house called Special.
TriggerActionType.Set EVA Voice [Ares].Name=Set EVA Voice [Ares]
TriggerActionType.Set EVA Voice [Ares].Description=Sets the player’s EVA voice. The builtin EVAs are 0, 1, and 2 for Allied, Russian and Yuri respectively. Higher numbers represent the custom EVAs. Use -1 to disable EVA.
TriggerActionType.Set Group [Ares].Name=Set Group [Ares]
TriggerActionType.Set Group [Ares].Description=Sets the group number for the object that triggered this action. This can be used to make units available for recruitment through TeamTypes and TaskForces.
