TriggerParamType.Waypoint=Waypoint

; *************************************************
;               Trigger Event Types
; *************************************************

TriggerEventType.No Event.Name=No Event
TriggerEventType.No Event.Description=This is a null event. There is no need to ever use this in a real trigger.
TriggerEventType.Entered By.Name=Entered By
TriggerEventType.Entered By.Description=Triggers when any infantry or vehicle of given house enters an attached building or celltag. You can use -1 to mean "any house".
TriggerEventType.Spied Upon.Name=Spied Upon
TriggerEventType.Spied Upon.Description=Triggers when a spy has entered an attached building.
TriggerEventType.Thieved By.Name=Thieved By
TriggerEventType.Thieved By.Description=Triggers when a thief steals money from the specified house.
TriggerEventType.Discovered by Player.Name=Discovered by Player
TriggerEventType.Discovered by Player.Description=Triggers when an attached object has been discovered by the player. Discovered means revealed from under the shroud. Do not use this in multiplayer maps as the shroud is not synchronized between players.
TriggerEventType.House Discovered.Name=House Discovered
TriggerEventType.House Discovered.Description=Triggers when the specified house has any of its units or buildings discovered by the player. Discovered means revealed from under the shroud. Do not use this in multiplayer maps as the shroud is not synchronized between players.
TriggerEventType.Attacked by Any House.Name=Attacked by Any House
TriggerEventType.Attacked by Any House.Description=Triggers when an attached object is attacked in some manner. Incidental damage or friendly fire does not count.
TriggerEventType.Destroyed by Any House.Name=Destroyed by Any House
TriggerEventType.Destroyed by Any House.Description=Triggers when the attached object has been destroyed. Destroyed by incidental damage or friendly fire doesn't count. In most cases it's recommended to use event 48 'Destroyed by anything' instead.
TriggerEventType.Any Event.Name=Any Event
TriggerEventType.Any Event.Description=When used alone, it will force the trigger to spring immediately. Bug: Known to have a glitch of catching or overriding some other event occurring at the same time on map start.
TriggerEventType.All Units Destroyed.Name=All Units Destroyed
TriggerEventType.All Units Destroyed.Description=Triggers when all units of the specified house have been destroyed. Typically used for end of game conditions. Does not include civilian objects.
TriggerEventType.All Buildings Destroyed.Name=All Buildings Destroyed
TriggerEventType.All Buildings Destroyed.Description=Triggers when all buildings of the specified house have been destroyed. Typically used for end of game conditions.
TriggerEventType.All Objects Destroyed.Name=All Objects Destroyed
TriggerEventType.All Objects Destroyed.Description=Triggers when all objects owned by the specified house have been destroyed. Typically used for end of game conditions.
TriggerEventType.Credits Exceed.Name=Credits Exceed
TriggerEventType.Credits Exceed.Description=Triggers when the house (of this trigger) credit total exceeds this specified amount.
TriggerEventType.Elapsed Time.Name=Elapsed Time
TriggerEventType.Elapsed Time.Description=Triggers when the elapsed time (in seconds, at 15 FPS) has expired. This time is initialized when the trigger is created. Timer is reset whenever trigger is sprung again when trigger is set to repeat.
TriggerEventType.Timer Expired.Name=Timer Expired
TriggerEventType.Timer Expired.Description=Triggers when the global mission timer (as displayed on the screen) has reached zero.
TriggerEventType.Destroyed, Buildings, #.Name=Destroyed, Buildings, #
TriggerEventType.Destroyed, Buildings, #.Description=Triggers when the number of buildings, owned by the trigger's specified house, have been destroyed.
TriggerEventType.Destroyed, Units, #.Name=Destroyed, Units, #
TriggerEventType.Destroyed, Units, #.Description=Triggers when the number of units, owned by the trigger's specified house, have been destroyed.
TriggerEventType.No Factories Left.Name=No Factories Left
TriggerEventType.No Factories Left.Description=Triggers when there are no factories left for the house specified in the trigger.
TriggerEventType.Civilians Evacuated.Name=Civilians Evacuated
TriggerEventType.Civilians Evacuated.Description=Triggers when civilians have been evacuated (left the map).
TriggerEventType.Built Building Type.Name=Built Building Type
TriggerEventType.Built Building Type.Description=When the trigger's house builds the building type specified, then this event will spring.
TriggerEventType.Built Unit Type.Name=Built Unit Type
TriggerEventType.Built Unit Type.Description=When the trigger's house builds the unit type specified, then this event will spring.
TriggerEventType.Built Infantry Type.Name=Built Infantry Type
TriggerEventType.Built Infantry Type.Description=When the trigger's house builds the infantry type specified, then this event will spring.
TriggerEventType.Built Aircraft Type.Name=Built Aircraft Type
TriggerEventType.Built Aircraft Type.Description=When the trigger's house builds the aircraft type specified, then this event will spring.
TriggerEventType.Team Leaves Map.Name=Team Leaves Map
TriggerEventType.Team Leaves Map.Description=Triggers when the specified team leaves the map. If the team is destroyed, it won't trigger. If all but one member is destroyed and that last member leaves the map, it WILL spring.
TriggerEventType.Zone Entry By.Name=Zone Entry By
TriggerEventType.Zone Entry By.Description=Triggers when a unit of the specified house enters the same CellTag zone that this trigger is attached to.
TriggerEventType.Crosses Horizontal Line.Name=Crosses Horizontal Line
TriggerEventType.Crosses Horizontal Line.Description=Triggers when a unit of the specified house crosses the horizontal line as indicated by the location of this trigger. This trigger must be placed in a cell.
TriggerEventType.Crosses Vertical Line.Name=Crosses Vertical Line
TriggerEventType.Crosses Vertical Line.Description=Triggers when a unit of the specified house crosses the vertical line as indicated by the location of this trigger. This trigger must be placed in a cell.
TriggerEventType.Global Is Set.Name=Global Is Set
TriggerEventType.Global Is Set.Description=Triggers when the specified global variable (named in rules.ini) is turned on. Note that when this event is triggered, it resets other events on this trigger (if any). That results in this event always getting checked before other events, regardless of order!
TriggerEventType.Global Is Clear.Name=Global Is Clear
TriggerEventType.Global Is Clear.Description=Triggers when the specified global variable (named in rules.ini) is turned off. Note that when this event is triggered, it resets other events on this trigger (if any). That results in this event always getting checked before other events, regardless of order!
TriggerEventType.Destroyed by Anything [Not Infiltrate].Name=Destroyed by Anything [Not Infiltrate]
TriggerEventType.Destroyed by Anything [Not Infiltrate].Description=Triggers when attached object is destroyed, but not if it infiltrates a building/unit.
TriggerEventType.Low Power.Name=Low Power
TriggerEventType.Low Power.Description=Triggers when the specified house's power falls below 100% level.
TriggerEventType.Bridge Destroyed.Name=Bridge Destroyed
TriggerEventType.Bridge Destroyed.Description=Triggers when the attached bridge is destroyed. A bridge is considered destroyed when an impassable gap is created in the bridge.
TriggerEventType.Building Exists.Name=Building Exists
TriggerEventType.Building Exists.Description=Triggers when the building specified (owned by the house of this trigger) exists on the map. Buildings considered are preplaced or deployed or ordered (icon clicked on in sidebar).
TriggerEventType.Selected by Player.Name=Selected by Player
TriggerEventType.Selected by Player.Description=Triggers when the unit is selected by the player. Use in single-player only.
TriggerEventType.Comes Near Waypoint.Name=Comes Near Waypoint
TriggerEventType.Comes Near Waypoint.Description=Triggers when the object comes near the specified waypoint.
TriggerEventType.Enemy in Spotlight.Name=Enemy in Spotlight
TriggerEventType.Enemy in Spotlight.Description=Triggers when an enemy unit enters the spotlight cast by the attached building. The attached tag must be set to repeat. See also event 54.
TriggerEventType.Local Is Set.Name=Local Is Set
TriggerEventType.Local Is Set.Description=Triggers when the specified local variable is turned on. Note that when this event is triggered, it resets other events on this trigger (if any). That results in this event always getting checked before other events, regardless of order!
TriggerEventType.Local Is Clear.Name=Local Is Clear
TriggerEventType.Local Is Clear.Description=Triggers when the specified global variable (named in rules.ini) is turned off. Note that when this event is triggered, it resets other events on this trigger (if any). That results in this event always getting checked before other events, regardless of order!
TriggerEventType.First Damaged (Combat Only).Name=First Damaged (Combat Only)
TriggerEventType.First Damaged (Combat Only).Description=Triggers when first suffering from combat damage from combat damage only.
TriggerEventType.Half Health (Combat Only).Name=Half Health (Combat Only)
TriggerEventType.Half Health (Combat Only).Description=Triggers when damaged to half health from combat damage only.
TriggerEventType.Quarter Health (Combat Only).Name=Quarter Health (Combat Only)
TriggerEventType.Quarter Health (Combat Only).Description=Triggers when damaged to quarter health from combat damage only.
TriggerEventType.First Damaged (Any Source).Name=First Damaged (Any Source)
TriggerEventType.First Damaged (Any Source).Description=Triggers when first suffering from combat damage from any source.
TriggerEventType.Half Health (Any Source).Name=Half Health (Any Source)
TriggerEventType.Half Health (Any Source).Description=Triggers when damaged to half health from any source.
TriggerEventType.Quarter Health (Any Source).Name=Quarter Health (Any Source)
TriggerEventType.Quarter Health (Any Source).Description=Triggers when damaged to quarter health from any source.
TriggerEventType.Attacked By.Name=Attacked By
TriggerEventType.Attacked By.Description=When attacked by some unit of specified house.
TriggerEventType.Ambient Light Below.Name=Ambient Light Below
TriggerEventType.Ambient Light Below.Description=Triggers when the ambient light drops below a certain level. Use numbers between 0 and 100.
TriggerEventType.Ambient Light Above.Name=Ambient Light Above
TriggerEventType.Ambient Light Above.Description=Triggers when the ambient light rises above a certain level. Use numbers between 0 and 100.
TriggerEventType.Elapsed Scenario Time.Name=Elapsed Scenario Time
TriggerEventType.Elapsed Scenario Time.Description=When time (in seconds) has elapsed since the start of the scenario.
TriggerEventType.Destroyed by Anything.Name=Destroyed by Anything
TriggerEventType.Destroyed by Anything.Description=Triggers when destroyed or captured or infiltrated by anything what-so-ever.
TriggerEventType.Picked Up Crate.Name=Picked Up Crate
TriggerEventType.Picked Up Crate.Description=When crate is picked up by an object attached to this trigger.
TriggerEventType.Picked Up Crate (Any).Name=Picked Up Crate (Any)
TriggerEventType.Picked Up Crate (Any).Description=When crate is picked up by any unit.
TriggerEventType.Random Delay.Name=Random Delay
TriggerEventType.Random Delay.Description=Delays a random time between 50 and 150 percent of time (frames) specified.
TriggerEventType.Credits Below.Name=Credits Below
TriggerEventType.Credits Below.Description=Triggers when the house (of this trigger) credit total is below this specified amount.
TriggerEventType.Player under EMP Effect.Name=Player under EMP Effect
TriggerEventType.Player under EMP Effect.Description=Attached objects are under EMP effect.
TriggerEventType.Enemy In Spotlight (Special).Name=Enemy In Spotlight (Special)
TriggerEventType.Enemy In Spotlight (Special).Description=Triggers when an enemy unit enters the spotlight cast by the attached building. Unlike event 35, attached tag need not be repeating.
TriggerEventType.Spy Enters As House.Name=Spy Enters As House
TriggerEventType.Spy Enters As House.Description=Triggers if a spy disguised as the house (of this trigger) specified enters this.
TriggerEventType.Spy Enters As Infantry.Name=Spy Enters As Infantry
TriggerEventType.Spy Enters As Infantry.Description=A spy disguised as the specified infantry enters the attached object.
TriggerEventType.Destroyed Units, Naval.Name=Destroyed Units, Naval
TriggerEventType.Destroyed Units, Naval.Description=Triggers when all naval units of the specified house have been destroyed.
TriggerEventType.Destroyed Units, Land.Name=Destroyed Units, Land
TriggerEventType.Destroyed Units, Land.Description=Triggers when all land units of the specified house have been destroyed.
TriggerEventType.Building Does Not Exist.Name=Building Does Not Exist
TriggerEventType.Building Does Not Exist.Description=No buildings of the specified type (owned by the house of this trigger) exist on the map.
TriggerEventType.Power Full.Name=Power Full
TriggerEventType.Power Full.Description=Triggers when the house (of this trigger) has 100% power.
TriggerEventType.Entered Or Overflown By.Name=Entered Or Overflown By
TriggerEventType.Entered Or Overflown By.Description=Triggers when objects owned by the house (of this trigger) move over the attached cell.
TriggerEventType.TechnoType Exists.Name=TechnoType Exists
TriggerEventType.TechnoType Exists.Description=Triggers when at least this many technos of the specified type exist on the map.
TriggerEventType.TechnoType Does Not Exist.Name=TechnoType Does Not Exist
TriggerEventType.TechnoType Does Not Exist.Description=Triggers when there are no technos of the specified type on the map.
TriggerEventType.Under EM Pulse [Ares].Name=Under EM Pulse [Ares]
TriggerEventType.Under EM Pulse [Ares].Description=Triggers when the attached object is disabled by EMP.
TriggerEventType.Under EM Pulse by House [Ares].Name=Under EM Pulse by House [Ares]
TriggerEventType.Under EM Pulse by House [Ares].Description=Triggers when the specified house disables the attached object by EMP. Triggers before 62.
TriggerEventType.Removed EM Pulse [Ares].Name=Removed EM Pulse [Ares]
TriggerEventType.Removed EM Pulse [Ares].Description=Triggers when the attached object is reactivated by a “healing” EMP.
TriggerEventType.Removed EM Pulse by House [Ares].Name=Removed EM Pulse by House [Ares]
TriggerEventType.Removed EM Pulse by House [Ares].Description=Triggers when the specified house reactivates the attached object by a “healing” EMP. Triggers before 64.
TriggerEventType.Enemy In Spotlight Now [Ares].Name=Enemy In Spotlight Now [Ares]
TriggerEventType.Enemy In Spotlight Now [Ares].Description=Triggers when the attached building’s searching spotlight found an enemy. Works like 35, but the game will not remember if this event occurred.
TriggerEventType.Driver Killed [Ares].Name=Driver Killed [Ares]
TriggerEventType.Driver Killed [Ares].Description=Triggers when the driver of the attached object has been killed.
TriggerEventType.Driver Killed By House [Ares].Name=Driver Killed By House [Ares]
TriggerEventType.Driver Killed By House [Ares].Description=Triggers when the specified house kills the driver of the attached object. Triggered before 67.
TriggerEventType.Vehicle Taken [Ares].Name=Vehicle Taken [Ares]
TriggerEventType.Vehicle Taken [Ares].Description=Triggers when a driver or Vehicle Thief enters the attached object.
TriggerEventType.Vehicle Taken By House [Ares].Name=Vehicle Taken By House [Ares]
TriggerEventType.Vehicle Taken By House [Ares].Description=Triggers when a driver or Vehicle Thief of the specified house enters the attached object. Triggers before 69.
TriggerEventType.Abducted [Ares].Name=Abducted [Ares]
TriggerEventType.Abducted [Ares].Description=Triggers when the attached object is abducted.
TriggerEventType.Abducted By House [Ares].Name=Abducted By House [Ares]
TriggerEventType.Abducted By House [Ares].Description=Triggers when the specified house abducts the attached object.
TriggerEventType.Abducts Something [Ares].Name=Abducts Something [Ares]
TriggerEventType.Abducts Something [Ares].Description=Triggers when the attached object abducts something.
TriggerEventType.Abducts Something Of House [Ares].Name=Abducts Something Of House [Ares]
TriggerEventType.Abducts Something Of House [Ares].Description=Triggers when an attached object abducts something of the specified house.
TriggerEventType.Super Weapon Activated [Ares].Name=Super Weapon Activated [Ares]
TriggerEventType.Super Weapon Activated [Ares].Description=Triggers when the owning house fires the super weapon.
TriggerEventType.Super Weapon Deactivated [Ares].Name=Super Weapon Deactivated [Ares]
TriggerEventType.Super Weapon Deactivated [Ares].Description=Triggers when the owning house deactivates the super weapon. Only Charge-Drain super weapon types deactivate.
TriggerEventType.Super Weapon Activated Near Waypoint [Ares].Name=Super Weapon Activated Near Waypoint [Ares]
TriggerEventType.Super Weapon Activated Near Waypoint [Ares].Description=Triggers when the named super weapon is used near the waypoint.
TriggerEventType.Reverse Engineered [Ares].Name=Reverse Engineered [Ares]
TriggerEventType.Reverse Engineered [Ares].Description=Triggers while the owning house has access to reverse engineered techno type. This event will trigger for the type a unit has been reversed as when put into a reverse engineering structure, that is, respecting ReversedAs.
TriggerEventType.Reverse Engineers Anything [Ares].Name=Reverse Engineers Anything [Ares]
TriggerEventType.Reverse Engineers Anything [Ares].Description=Triggers when the attached building successfully reverse engineers any type.
TriggerEventType.Reverse Engineers Type [Ares].Name=Reverse Engineers Type [Ares]
TriggerEventType.Reverse Engineers Type [Ares].Description=Triggers when the attached building successfully reverse engineers the specific type.
TriggerEventType.House Owns Techno Type [Ares].Name=House Owns Techno Type [Ares]
TriggerEventType.House Owns Techno Type [Ares].Description=Triggers while the owning house has at least count instances of the specified techno type.
TriggerEventType.House Doesn’t Own Techno Type [Ares].Name=House Doesn’t Own Techno Type [Ares]
TriggerEventType.House Doesn’t Own Techno Type [Ares].Description=Triggers while the owning house has fewer than count instances of the specified techno type.
TriggerEventType.Attacked Or Destroyed By Anybody [Ares].Name=Attacked Or Destroyed By Anybody [Ares]
TriggerEventType.Attacked Or Destroyed By Anybody [Ares].Description=Triggers when the attached object is attacked or destroyed by any attack (even ones without source).
TriggerEventType.Attacked Or Destroyed By House [Ares].Name=Attacked Or Destroyed By House [Ares]
TriggerEventType.Attacked Or Destroyed By House [Ares].Description=Triggers when the attached object is attacked or destroyed by an attack where the source is owned by a specific house.
TriggerEventType.Destroyed By House [Ares].Name=Destroyed By House [Ares]
TriggerEventType.Destroyed By House [Ares].Description=Triggers when the attached object is destroyed by any attack where the source is owned by a specific house.
TriggerEventType.Techno Type Doesn't Exist More Than [Ares].Name=Techno Type Doesn't Exist More Than [Ares]
TriggerEventType.Techno Type Doesn't Exist More Than [Ares].Description=Triggers while there are no more than count instances of the specified techno type.
TriggerEventType.All KeepAlives Destroyed [Ares]).Name=All KeepAlives Destroyed [Ares]
TriggerEventType.All KeepAlives Destroyed [Ares].Description=Triggers when the specified house has no more KeepAlive=yes objects.
TriggerEventType.All KeepAlive Buildings Destroyed [Ares].Name=All KeepAlive Buildings Destroyed [Ares]
TriggerEventType.All KeepAlive Buildings Destroyed [Ares].Description=Triggers when the specified house has no more buildings with KeepAlive=yes.

; *************************************************
;                Trigger Action Types
; *************************************************

TriggerActionType.No Action.Name=No Action
TriggerActionType.No Action.Description=This is a null action. It will do nothing and is equivalent to not having an action at all.
TriggerActionType.Winner Is.Name=Winner Is
TriggerActionType.Winner Is.Description=The winner will be forced to be the house specified. The game will end immediately. Typically, the player's house is specified.
TriggerActionType.Loser Is.Name=Loser Is
TriggerActionType.Loser Is.Description=The loser will be forced to be the house specified. The game will end immediately. Typically, the player's house is specified.
TriggerActionType.Production Begins.Name=Production Begins
TriggerActionType.Production Begins.Description=The computer's house (as specified) will begin production of units and structures.
TriggerActionType.Create Team.Name=Create Team
TriggerActionType.Create Team.Description=Creates a team of the type specified. Recruits team members if possible or else makes the owner of the TeamType build the units from factories.
TriggerActionType.Destroy Team.Name=Destroy Team
TriggerActionType.Destroy Team.Description=Destroys all instances of the team type specified. The units in those existing teams will remain and be available for recruiting into other teams.
TriggerActionType.All to Hunt.Name=All to Hunt
TriggerActionType.All to Hunt.Description=Forces all units, of the house specified, into 'hunt' mode. They will seek out and destroy their enemies.
TriggerActionType.Reinforcement.Name=Reinforcement
TriggerActionType.Reinforcement.Description=Create a reinforcement of the specified team. The members of the team WILL be created magically by this action.
TriggerActionType.Drop Zone Flare.Name=Drop Zone Flare
TriggerActionType.Drop Zone Flare.Description=Display a drop zone flare at the waypoint specified. The map will also be revealed around that location.
TriggerActionType.Fire Sale.Name=Fire Sale
TriggerActionType.Fire Sale.Description=Cause all buildings of the specified house to be sold (for cash and prizes). Typically this is used in the final assault by the computer.
TriggerActionType.Play Movie.Name=Play Movie
TriggerActionType.Play Movie.Description=Displays the specified movie (full screen). The game is paused while this occurs and resumes normally after it completes.
TriggerActionType.Text Trigger.Name=Text Trigger
TriggerActionType.Text Trigger.Description=Display a stringtable string.
TriggerActionType.Destroy Trigger.Name=Destroy Trigger
TriggerActionType.Destroy Trigger.Description=Destroy all current instances of the trigger type specified. This does not prevent future instances of that trigger >from being created.
TriggerActionType.Autocreate Begins.Name=Autocreate Begins
TriggerActionType.Autocreate Begins.Description=Initiates autocreate for the house specified. This will cause the computer's house to build autocreate teams as it sees fit.
TriggerActionType.Change House.Name=Change House
TriggerActionType.Change House.Description=Changes owning house to the one specified for attached objects.
TriggerActionType.Allow Win.Name=Allow Win
TriggerActionType.Allow Win.Description=Not functional in Tiberian Sun and Yuri's Revenge. In Red Alert 1, removes one 'blockage' from allowing the player to win. The blockage number is equal the number of triggers created that have this action.
TriggerActionType.Reveal All Map.Name=Reveal All Map
TriggerActionType.Reveal All Map.Description=Reveals the entire map to all players.
TriggerActionType.Reveal Around Waypoint.Name=Reveal Around Waypoint
TriggerActionType.Reveal Around Waypoint.Description=Reveals a region of the map to the player around the waypoint specified.
TriggerActionType.Reveal Zone of Waypoint.Name=Reveal Zone of Waypoint
TriggerActionType.Reveal Zone of Waypoint.Description=Reveals all cells that share the same zone as the waypoint specified. This yields some wierd results. Use with caution.
TriggerActionType.Play Sound.Name=Play Sound
TriggerActionType.Play Sound.Description=Plays the sound effect specified. Use numbers from Sounds.ini.
TriggerActionType.Play Music Theme.Name=Play Music Theme
TriggerActionType.Play Music Theme.Description=Plays the specified music track. Tracks are listed in Theme.ini.
TriggerActionType.Play Speech.Name=Play Speech
TriggerActionType.Play Speech.Description=Plays the speech sound specified.
TriggerActionType.Force Trigger.Name=Force Trigger
TriggerActionType.Force Trigger.Description=Force all triggers of this specified type to spring regardless of what its event flags may indicate.
TriggerActionType.Timer Start.Name=Timer Start
TriggerActionType.Timer Start.Description=Start the global mission timer.
TriggerActionType.Timer Stop.Name=Timer Stop
TriggerActionType.Timer Stop.Description=Stop the global mission timer.
TriggerActionType.Timer Extend.Name=Timer Extend
TriggerActionType.Timer Extend.Description=Extend the global mission timer by the time specified (in seconds, at 15 FPS).
TriggerActionType.Timer Shorten.Name=Timer Shorten
TriggerActionType.Timer Shorten.Description=Short the global mission timer by the time specified (in seconds, at 15 FPS). It can never be reduced below 'zero' time.
TriggerActionType.Timer Set.Name=Timer Set
TriggerActionType.Timer Set.Description=Set the global mission timer to the value specified (in seconds, at 15 FPS).
TriggerActionType.Global Set.Name=Global Set
TriggerActionType.Global Set.Description=Set the global flag. Global variables are named in the file rules.ini. Global flags can be either 'on/set/true' or 'off/clear/false'.
TriggerActionType.Global Clear.Name=Global Clear
TriggerActionType.Global Clear.Description=Clear the global flag. Global variables are named in the file rules.ini. Global flags can either be 'on/set/true' or 'off/clear/false'.
TriggerActionType.Auto Base Building.Name=Auto Base Building
TriggerActionType.Auto Base Building.Description=Initialize the computer skirmish mode build control to either 'on' or 'off' state. When 'on' the computer takes over as if it were in skirmish mode. (gs make sure he has a con yard)
TriggerActionType.Grow Shroud One Step.Name=Grow Shroud One Step
TriggerActionType.Grow Shroud One Step.Description=Increase the shroud darkness by one step (cell).
TriggerActionType.Destroy Attached Object.Name=Destroy Attached Object
TriggerActionType.Destroy Attached Object.Description=Destroy any buildings, bridges, or units that this trigger is attached to.
TriggerActionType.Add One-Time Special Weapon.Name=Add One-Time Special Weapon
TriggerActionType.Add One-Time Special Weapon.Description=Add a one-shot special weapon (as indicated) to the trigger's house.
TriggerActionType.Add Repeating Special Weapon.Name=Add Repeating Special Weapon
TriggerActionType.Add Repeating Special Weapon.Description=Add a permanent special weapon (as indicated) to the trigger's house.
TriggerActionType.Preferred Target.Name=Preferred Target
TriggerActionType.Preferred Target.Description=Specify what the trigger's house should use as its preferred target when using special weapon attacks.
TriggerActionType.All Change House.Name=All Change House
TriggerActionType.All Change House.Description=All objects of the trigger owner's house change ownership to specified house.
TriggerActionType.Make Ally.Name=Make Ally
TriggerActionType.Make Ally.Description=Cause this trigger's house to ally with the specified house, and the specified house to ally with this trigger's house (two-way alliance).
TriggerActionType.Make Enemy.Name=Make Enemy
TriggerActionType.Make Enemy.Description=Cause this trigger's house to un-ally (declare war) with the house specified.
TriggerActionType.Change Zoom Level.Name=Change Zoom Level
TriggerActionType.Change Zoom Level.Description=Changes the zoom out level of the player's radar map.  Use 1 for normal view, 2 for zoomed out.
TriggerActionType.Resize Player View.Name=Resize Player View
TriggerActionType.Resize Player View.Description=Changes the player's viewing rectangle area in the map. Enter as: x, y, w, h where x, y gives the upper left corner and w, h give the width and height.
TriggerActionType.Resize Player View.Parameter2.NameOverride=Left
TriggerActionType.Resize Player View.Parameter3.NameOverride=Top
TriggerActionType.Resize Player View.Parameter4.NameOverride=Width
TriggerActionType.Resize Player View.Parameter5.NameOverride=Height
TriggerActionType.Play Anim at.Name=Play Anim at
TriggerActionType.Play Anim at.Description=Plays the specified anim in the specified cell. Use index from [Animations] section in rules.ini.
TriggerActionType.Do Explosion at.Name=Do Explosion at
TriggerActionType.Do Explosion at.Description=Creates an explosion at the specified waypoint using the specified weapon's warhead. Uses 0-based index from game's internal WeaponTypes list. The provided list only includes items from the [Weapons] section in rules.ini.
TriggerActionType.Create VoxelAnim at.Name=Create VoxelAnim at
TriggerActionType.Create VoxelAnim at.Description=Creates a VoxelAnim (uses 0-based index from VoxelAnims list) at the specified waypoint. Also plays EVA speech Meteor storm approaching.
TriggerActionType.Ion Storm Start.Name=Ion Storm Start
TriggerActionType.Ion Storm Start.Description=Starts an ion storm sequence to run for the specified number of game frames.
TriggerActionType.Ion Storm Stop.Name=Ion Storm Stop
TriggerActionType.Ion Storm Stop.Description=End an Ion storm in progress.
TriggerActionType.Lock Input.Name=Lock Input
TriggerActionType.Lock Input.Description=Disables user input.
TriggerActionType.Unlock Input.Name=Unlock Input
TriggerActionType.Unlock Input.Description=Enables user input.
TriggerActionType.Center Camera at Waypoint.Name=Center Camera at Waypoint
TriggerActionType.Center Camera at Waypoint.Description=Moves the tactical view to a specified waypoint with the given speed (0-4).
TriggerActionType.Center Camera at Waypoint.Parameter1.NameOverride=Camera speed (0-4)
TriggerActionType.Center Camera at Waypoint.Parameter1.PresentOption0=0 Very Slow
TriggerActionType.Center Camera at Waypoint.Parameter1.PresentOption1=1 Slow
TriggerActionType.Center Camera at Waypoint.Parameter1.PresentOption2=2 Medium
TriggerActionType.Center Camera at Waypoint.Parameter1.PresentOption3=3 Fast
TriggerActionType.Center Camera at Waypoint.Parameter1.PresentOption4=4 Very Fast
TriggerActionType.Zoom In.Name=Zoom In
TriggerActionType.Zoom In.Description=Zooms the tactical map in.
TriggerActionType.Zoom Out.Name=Zoom Out
TriggerActionType.Zoom Out.Description=Zooms the tactical map out.
TriggerActionType.Reshroud Map.Name=Reshroud Map
TriggerActionType.Reshroud Map.Description=Reshrouds the entire map for all players.
TriggerActionType.Change Spotlight Behavior.Name=Change Spotlight Behavior
TriggerActionType.Change Spotlight Behavior.Description=Changes the way a building's spotlight behaves. Attach this trigger to a building that casts a spotlight. 0=No Spotlight, 1=Rules.ini settings (affected by direction), 2=Circle and 3=Follow Unit in Spotlight.
TriggerActionType.Enable Trigger.Name=Enable Trigger
TriggerActionType.Enable Trigger.Description=Enables the target trigger.
TriggerActionType.Disable Trigger.Name=Disable Trigger
TriggerActionType.Disable Trigger.Description=Disables the target trigger.
TriggerActionType.Create Radar Event.Name=Create Radar Event
TriggerActionType.Create Radar Event.Description=Creates a radar event at the specified waypoint. 0 = red - won't spawn if one is already on the radar, 1 = green, 2 = green, 3 = red, 4 = same as 0, 5 = yellow - won't spawn if one is already on the radar, 6 = yellow - stays on the radar forever
TriggerActionType.Create Radar Event.Parameter1.PresentOption0=0 red - one only
TriggerActionType.Create Radar Event.Parameter1.PresentOption1=1 green
TriggerActionType.Create Radar Event.Parameter1.PresentOption2=2 green
TriggerActionType.Create Radar Event.Parameter1.PresentOption3=3 red
TriggerActionType.Create Radar Event.Parameter1.PresentOption4=4 red - one only
TriggerActionType.Create Radar Event.Parameter1.PresentOption5=5 yellow - one only
TriggerActionType.Create Radar Event.Parameter1.PresentOption6=6 - yellow permanent
TriggerActionType.Local Set.Name=Local Set
TriggerActionType.Local Set.Description=Set the local flag. Local variable can be either 'on/set/true' or 'off/clear/false'.
TriggerActionType.Local Clear.Name=Local Clear
TriggerActionType.Local Clear.Description=Clear the local flag. Local variables can either be 'on/set/true' or 'off/clear/false'.
TriggerActionType.Meteor Shower At.Name=Meteor Shower At
TriggerActionType.Meteor Shower At.Description=Creates a meteor shower around the specified waypoint. Shower size 0-3.
TriggerActionType.Meteor Shower At.Parameter1.NameOverride=Shower size (0-3)
TriggerActionType.Meteor Shower At.Parameter1.PresentOption0=0 Small
TriggerActionType.Meteor Shower At.Parameter1.PresentOption1=1 Medium
TriggerActionType.Meteor Shower At.Parameter1.PresentOption2=2 Large
TriggerActionType.Meteor Shower At.Parameter1.PresentOption3=3 Huge
TriggerActionType.Reduce Ore At.Name=Reduce Ore At
TriggerActionType.Reduce Ore At.Description=Reduces Ore at the specified waypoint.
TriggerActionType.Sell Building.Name=Sell Building
TriggerActionType.Sell Building.Description=Sells the building attached to this trigger.
TriggerActionType.Turn Off Building.Name=Turn Off Building
TriggerActionType.Turn Off Building.Description=Turn off building attached to this trigger.
TriggerActionType.Turn On Building.Name=Turn On Building
TriggerActionType.Turn On Building.Description=Turn on building attached to this trigger.
TriggerActionType.Apply 100 Damage at.Name=Apply 100 Damage at
TriggerActionType.Apply 100 Damage at.Description=Applies 100 points of HE damage at waypoint location.
TriggerActionType.Light Flash (Small) at.Name=Light Flash (Small) at
TriggerActionType.Light Flash (Small) at.Description=Shows a small light flash at waypoint location.
TriggerActionType.Light Flash (Medium) at.Name=Light Flash (Medium) at
TriggerActionType.Light Flash (Medium) at.Description=Shows a medium light flash at waypoint location.
TriggerActionType.Light Flash (Large) at.Name=Light Flash (Large) at
TriggerActionType.Light Flash (Large) at.Description=Shows a large light flash at waypoint location.
TriggerActionType.Announce Win.Name=Announce Win
TriggerActionType.Announce Win.Description=Announce that player has won.
TriggerActionType.Announce Lose.Name=Announce Lose
TriggerActionType.Announce Lose.Description=Announce that player has lost.
TriggerActionType.Force End.Name=Force End
TriggerActionType.Force End.Description=Force end of scenario.
TriggerActionType.Destroy Tag.Name=Destroy Tag
TriggerActionType.Destroy Tag.Description=Destroy tag and all attached triggers.
TriggerActionType.Set Ambient Step.Name=Set Ambient Step
TriggerActionType.Set Ambient Step.Description=Sets ambient light change step value. Input a decimal number (usually from 0.05 to 0.1).
TriggerActionType.Set Ambient Rate.Name=Set Ambient Rate
TriggerActionType.Set Ambient Rate.Description=Sets ambient light change rate. Input a decimal number (usually from 0.3 to 0.8).
TriggerActionType.Set Ambient Light.Name=Set Ambient Light
TriggerActionType.Set Ambient Light.Description=Fades ambient light to new lighting level. Use numbers between 0 and 100.
TriggerActionType.AI Triggers Begin.Name=AI Triggers Begin
TriggerActionType.AI Triggers Begin.Description=Start AI triggers for specified house.
TriggerActionType.AI Triggers Stop.Name=AI Triggers Stop
TriggerActionType.AI Triggers Stop.Description=Stop AI triggers for specified house.
TriggerActionType.Ratio of AI Trigger Teams.Name=Ratio of AI Trigger Teams
TriggerActionType.Ratio of AI Trigger Teams.Description=Specify AI percentage of teams created for AI triggers (100 = all for AI trigger teams, 0 = all for regular teams).
TriggerActionType.Ratio of Team Aircraft.Name=Ratio of Team Aircraft
TriggerActionType.Ratio of Team Aircraft.Description=Specify AI percentage of aircraft created for teams (100 = all for teams, 0 = all random).
TriggerActionType.Ratio of Team Infantry.Name=Ratio of Team Infantry
TriggerActionType.Ratio of Team Infantry.Description=Specify AI percentage of infantry created for teams (100 = all for teams, 0 = all random).
TriggerActionType.Ratio of Team Units.Name=Ratio of Team Units
TriggerActionType.Ratio of Team Units.Description=Specify AI percentage of units created for teams (100 = all for teams, 0 = all random).
TriggerActionType.Reinforcement At Waypoint.Name=Reinforcement At Waypoint
TriggerActionType.Reinforcement At Waypoint.Description=Create reinforcement team at special waypoint location. The units will appear at this point. Magical-poof style.
TriggerActionType.Wakeup Self.Name=Wakeup Self
TriggerActionType.Wakeup Self.Description=Breaks out of sleep or harmless mode so as to enter guard mode.
TriggerActionType.Wake up All Sleepers.Name=Wake up All Sleepers
TriggerActionType.Wake up All Sleepers.Description=Breaks all units out of sleep mode of the trigger owner's house.
TriggerActionType.Wake up All Harmless.Name=Wake up All Harmless
TriggerActionType.Wake up All Harmless.Description=Breaks all out of harmless mode of the trigger owner's house.
TriggerActionType.Wake up Group.Name=Wake up Group
TriggerActionType.Wake up Group.Description=Wakeup all units of specified group of the trigger owner's house.
TriggerActionType.Vein Growth.Name=Vein Growth
TriggerActionType.Vein Growth.Description=Control if veins grow or not.
TriggerActionType.Ore Growth.Name=Ore Growth
TriggerActionType.Ore Growth.Description=Control if ore grows or not.
TriggerActionType.Ice Growth.Name=Ice Growth
TriggerActionType.Ice Growth.Description=Control if ice grows or not.
TriggerActionType.ParticleSystem Anim at.Name=ParticleSystem Anim at
TriggerActionType.ParticleSystem Anim at.Description=Show particle animation at waypoint location.
TriggerActionType.Remove ParticleSystem Anim at.Name=Remove ParticleSystem Anim at
TriggerActionType.Remove ParticleSystem Anim at.Description=Delete particle anims at specified waypoint location.
TriggerActionType.Lightning Strike at.Name=Lightning Strike at
TriggerActionType.Lightning Strike at.Description=A single Ion Storm lightning strike at waypoint.
TriggerActionType.Go Berzerk.Name=Go Berzerk
TriggerActionType.Go Berzerk.Description=Attached object (cyborg) goes berzerk.
TriggerActionType.Activate Firestorm Defense.Name=Activate Firestorm Defense
TriggerActionType.Activate Firestorm Defense.Description=Turns on a house's firestorm defense.
TriggerActionType.Deactivate Firestorm Defense.Name=Deactivate Firestorm Defense
TriggerActionType.Deactivate Firestorm Defense.Description=Turns off a house's firestorm defense.
TriggerActionType.Ion Cannon Strike.Name=Ion Cannon Strike
TriggerActionType.Ion Cannon Strike.Description=Fires Ion-Cannon at waypoint specified.
TriggerActionType.Nuke Strike.Name=Nuke Strike
TriggerActionType.Nuke Strike.Description=Fires Nuke at waypoint specified from nearest edge.
TriggerActionType.Chemical Missile Strike.Name=Chemical Missile Strike
TriggerActionType.Chemical Missile Strike.Description=Fires Chemical missile at waypoint specified.
TriggerActionType.Toggle Train Cargo.Name=Toggle Train Cargo
TriggerActionType.Toggle Train Cargo.Description=Toggles state of cargo train dropping crate.
TriggerActionType.Play Sound Effect (Random).Name=Play Sound Effect (Random)
TriggerActionType.Play Sound Effect (Random).Description=Plays sound effect at random waypoint. Rules of action 19 apply.
TriggerActionType.Play Sound Effect at Waypoint.Name=Play Sound Effect at Waypoint
TriggerActionType.Play Sound Effect at Waypoint.Description=Plays sound effect specified at waypoint specified. Rules of action 19 apply.
TriggerActionType.Play Ingame Movie.Name=Play Ingame Movie
TriggerActionType.Play Ingame Movie.Description=Displays the specified movie ingame. Player still has control of interface and units.
TriggerActionType.Flash Team.Name=Flash Team
TriggerActionType.Flash Team.Description=Flashes all members of a TeamType for the specified number of frames.
TriggerActionType.Reshroud Map at.Name=Reshroud Map at
TriggerActionType.Reshroud Map at.Description=Reshrouds map around waypoint.
TriggerActionType.Lightning Storm Strike.Name=Lightning Storm Strike
TriggerActionType.Lightning Storm Strike.Description=Trigger's House fires a Lightning Storm at the specified waypoint.
TriggerActionType.Timer Text.Name=Timer Text
TriggerActionType.Timer Text.Description=Displays text string from CSF as mission timer text.
TriggerActionType.Set Object Tech Level.Name=Set Object Tech Level
TriggerActionType.Set Object Tech Level.Description=Sets the specified object type to have the specified tech level.
TriggerActionType.Reinforcement by Chrono.Name=Reinforcement by Chrono
TriggerActionType.Reinforcement by Chrono.Description=Creates an instance of a TeamType by Chronoshifting it into the map. The team is owned by the trigger's owning house.
TriggerActionType.Create Crate.Name=Create Crate
TriggerActionType.Create Crate.Description=Creates a Crate with specific contents at a waypoint.
