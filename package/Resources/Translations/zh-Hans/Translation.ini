INI:Maps:Maps\Yuri's Revenge\blitz_carnival_2v2:Briefing=- 盟军阵营拥有盟军的所有科技（除了法国）。@- 苏军阵营拥有苏军的所有科技（尤里是苏军）。@- 没有矿，建造钻油井获得资金（电力消耗: 35）。@- 所有玩家建筑不能被工程师占领。@- 超时空军团无法攻击钻油井。@- 一局内最多建造 12 座钻油井。@- 预占领科技发电厂、钻油井、科技机场和一个单机位的停机坪。@- 心灵控制器可以被占领，但无法被摧毁。@- 核电厂可以被占领，但无法被摧毁。@- 每 10 分钟游戏时间在心灵控制器周围刷新资金工具箱。@----------------------------------------------------------------------@闪电战 Mod 作者: Burg, Snark
; - Allied factions have all Allied faction bonuses (Minus France).@- Soviet factions have all Soviet faction bonuses. Yuri Is Sov.@- No Ore, Build Oil For Money (Consumes 35 Power).@- All player buildings are engi immune.@- Chrono Legionnaires can't attack oils.@- Limit of 12 oils can be built per game.@- Tech Power Plant, Oil, Tech Airport and A single Aircraft Pad Precapturd.@- Psychic Dominator is indestructible & Capturable.@- Nuclear power plant is indestructible & Capturable.@- Money crates spawn around Dominator every 10 game mins.@----------------------------------------------------------------------@Blitz Mod by: Burg, Snark
