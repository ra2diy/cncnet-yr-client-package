Client:Main:AutoAllyingText1=自动结盟允许房主根据出生点位来分配结盟，而不是由玩家决定。@游戏开始后，会自动将对应出生点位的玩家分配到对应的队伍中。@随机队伍是必须设定的，不过，结合随机队伍和随机出生点的情况下使用最佳。@手动选择的出生点具有更高的优先级。
; Auto allying allows the host to assign starting locations to teams, not players.@When players are assigned to spawn locations, they will be auto assigned to teams based on these mappings.@This is best used with random teams and random starts. However, only random teams is required.@Manually specified starts will take precedence.
