[Themes]
0=CnCNet Classic,Yuri Theme\
1=Allied Theme,Allied Theme\
2=Soviet Theme,Soviet Theme\

[Settings]
SaveSkirmishGameOptions=yes
DisableMultiplayerGameLoading=no
CreateSavedGamesDirectory=yes

; The filename of the game executable to launch
; Accepts multiple entries separated with a comma,
; but currently only the first entry is ever used.
GameExecutableNames=gamemd-spawn.exe
; Game launcher executable such as Syringe.
GameLauncherExecutableName=syringe.exe
; Game executable name for Linux/Mac systems.
UnixGameExecutableName=Resources/Compatibility/Unix/wine-game.sh
; Additional command line parameters applied after -SPAWN.
ExtraCommandLineParams=-LOG -CD -RA2ModeSaveID=0x8d143b95

SettingsFile=RA2MD.ini
ConfigWindowTitle=YR Settings
MPMapsPath=INI\MPMaps.ini
LoadingScreenCount=0
LongGameName=Yuri's Revenge
LocalGame=YR
RegistryInstallPath=YurisRevenge
CnCNetLiveStatusIdentifier=cncnet5_yr
CreditsURL=http://www.moddb.com/mods/the-dawn-of-the-tiberium-age/tutorials/credits
ChangelogURL=https://github.com/CnCNet/cncnet-yr-client-package/releases
LongSupportURL=https://cncnet.org/discord
ShortSupportURL=cncnet.org/discord
MapEditorExePath=Map Editor\Map Editor.bat
FSIniPath=Map Editor\FinalSun.ini
BattleFSFileName=BattleE.ini
SidebarHack=yes
MinimumRenderWidth=1024
MinimumRenderHeight=600
MaximumRenderWidth=1600
MaximumRenderHeight=900
MapCellSizeX=60
MapCellSizeY=30
AllowedCustomGameModes=Standard,Custom Map,Teamgame,Duel,Airwar,Nukewar,Navalwar
KeyboardINI=KeyboardMD.ini
DefaultKeyboardINI=INI\KeyboardMD.ini
MaxNameLength=12
Quickmatch=Qt\CnCNetQM.exe
LauncherExe=CnCNetYRLauncher.exe
DiscordAppId=830497958034145300
DisallowJoiningIncompatibleGames=true
; 15 minutes until warning
InactiveHostWarningMessageSeconds=900
; 5 minutes after warning
InactiveHostKickSeconds=300

