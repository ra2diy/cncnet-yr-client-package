; INI Control File for additional artmd entries for community maps.
; Any and all additions should only be used for custom maps. It should NEVER be noticeable or seen in vanilla.
;
; All assets used and provided by the community **MUST** be for public use and free of copyright restrictions.
; After making changes here and submitting them to the CNC-Net YR repository, please wait for approval.
;
; Try to keep this file clean and organized for future contributors.
; Below is an example of how to create a clone of the GI unit with a different cameo.
;
; Created by the CNCNet community.
;-------------------------------------------------------------------------------------------------------------

; [STRONGER_GI]
; Image=GI
; CameoPCX=supergiicon.pcx
; AltCameoPCX=supergiico.pcx
; Sequence=GISequence
; Crawls=yes
; Remapable=yes
; FireUp=2
; PrimaryFireFLH=80,0,105
; SecondaryFireFLH=80,0,90

